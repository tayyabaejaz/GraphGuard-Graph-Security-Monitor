<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphGuard — Security Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:       #080c10;
    --surface:  #0d1117;
    --card:     #111820;
    --border:   #1e2d3d;
    --accent:   #00d4ff;
    --red:      #ff3c5a;
    --orange:   #ff8c42;
    --green:    #00ff9d;
    --yellow:   #ffd166;
    --text:     #c9d8e8;
    --muted:    #4a6070;
    --critical: #ff3c5a;
    --high:     #ff8c42;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 10px rgba(0,212,255,0.3); }
    50%      { box-shadow: 0 0 22px rgba(0,212,255,0.6); }
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: #fff;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px;
    border-radius: 20px;
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.25);
    font-size: 11px;
    color: var(--green);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger { border-color: rgba(255,60,90,0.4); color: var(--red); }
  .btn-danger:hover { background: rgba(255,60,90,0.1); border-color: var(--red); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 57px);
  }

  /* ── Stat Bar ── */
  .stat-bar {
    grid-column: 1 / -1;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stat {
    flex: 1;
    padding: 26px 19px;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .stat::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.4s;
  }

  .stat.critical::before { background: var(--critical); transform: scaleX(1); }
  .stat.high::before     { background: var(--high);     transform: scaleX(1); }
  .stat.active::before   { transform: scaleX(1); }

  .stat-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    transition: color 0.3s;
  }

  .stat.critical .stat-value { color: var(--critical); }
  .stat.high .stat-value     { color: var(--high); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    padding: 12px 16px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title .count {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    color: var(--accent);
  }

  /* ── Attack Buttons ── */
  .attack-grid {
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .attack-btn {
    padding: 10px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.5;
  }

  .attack-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,60,90,0.06);
    box-shadow: 0 0 12px rgba(255,60,90,0.15);
  }

  .attack-btn .icon { display: block; font-size: 16px; margin-bottom: 4px; }

  /* ── Alerts Feed ── */
  .alerts-feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .alerts-feed::-webkit-scrollbar { width: 4px; }
  .alerts-feed::-webkit-scrollbar-track { background: transparent; }
  .alerts-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .alert-card {
    margin-bottom: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    overflow: hidden;
    animation: slide-in 0.3s ease;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .alert-card:hover { border-color: var(--muted); }

  .alert-card.critical { border-left: 3px solid var(--critical); }
  .alert-card.high     { border-left: 3px solid var(--high); }

  .alert-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  .severity-badge {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
  }

  .severity-badge.critical { background: rgba(255,60,90,0.15); color: var(--critical); }
  .severity-badge.high     { background: rgba(255,140,66,0.15); color: var(--orange); }

  .alert-rule { font-size: 10px; color: var(--accent); flex: 1; }
  .alert-time { font-size: 9px; color: var(--muted); }

  .alert-body { padding: 8px 10px; }
  .alert-title { font-size: 11px; color: #fff; margin-bottom: 4px; font-weight: 500; }
  .alert-detail { font-size: 10px; color: var(--muted); line-height: 1.6; }

  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    line-height: 2;
  }

  .empty-state .icon { font-size: 28px; display: block; margin-bottom: 8px; opacity: 0.4; }

  /* ── Graph Canvas ── */
  .graph-panel {
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .graph-panel svg {
    width: 100%;
    height: 100%;
  }

  .graph-label {
    position: absolute;
    top: 14px; left: 14px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .graph-legend {
    position: absolute;
    bottom: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 10px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 5px;
  }

  .legend-item:last-child { margin-bottom: 0; }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* tooltip */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    max-width: 220px;
    line-height: 1.7;
  }

  .tooltip.visible { opacity: 1; }
  .tooltip strong { color: var(--accent); display: block; margin-bottom: 2px; }

  /* flash overlay for new alerts */
  .flash {
    position: fixed;
    inset: 0;
    background: rgba(255,60,90,0.04);
    pointer-events: none;
    opacity: 0;
    z-index: 9998;
    transition: opacity 0.5s;
  }

  .flash.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <div class="logo-text">Graph<span>Guard</span></div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      MONITOR ACTIVE
    </div>
    <button class="btn" onclick="refreshAll()">↺ Refresh</button>
    <button class="btn btn-danger" onclick="resetGraph()">⟳ Reset Graph</button>
  </div>
</header>

<div class="layout">
  <div class="stat-bar">
    <div class="stat active" id="stat-nodes">
      <div class="stat-label">Graph Nodes</div>
      <div class="stat-value" id="val-nodes">—</div>
    </div>
    <div class="stat active" id="stat-edges">
      <div class="stat-label">Graph Edges</div>
      <div class="stat-value" id="val-edges">—</div>
    </div>
    <div class="stat" id="stat-total">
      <div class="stat-label">Total Alerts</div>
      <div class="stat-value" id="val-total">0</div>
    </div>
    <div class="stat critical" id="stat-critical">
      <div class="stat-label">Critical</div>
      <div class="stat-value" id="val-critical">0</div>
    </div>
    <div class="stat high" id="stat-high">
      <div class="stat-label">High</div>
      <div class="stat-value" id="val-high">0</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Attack Simulations</div>
      <div class="attack-grid">
        <button class="attack-btn" onclick="simulate('forged_edge')">
          <span class="icon">⚡</span>Forged Edge
        </button>
        <button class="attack-btn" onclick="simulate('trust_escalation')">
          <span class="icon">🔺</span>Trust Escalation
        </button>
        <button class="attack-btn" onclick="simulate('velocity_flood')">
          <span class="icon">🌊</span>Velocity Flood
        </button>
        <button class="attack-btn" onclick="simulate('subgraph_injection')">
          <span class="icon">💉</span>Subgraph Inject
        </button>
      </div>
    </div>

    <div class="sidebar-title">
      Alert Feed
      <span class="count" id="alert-count">0</span>
    </div>
    <div class="alerts-feed" id="alerts-feed">
      <div class="empty-state">
        <span class="icon">🔍</span>
        No alerts yet.<br>Run a simulation<br>to trigger detections.
      </div>
    </div>
  </div>

  <div class="graph-panel" id="graph-panel">
    <div class="graph-label">LIVE CONTEXT GRAPH</div>
    <svg id="graph-svg"></svg>
    <div class="graph-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00d4ff"></div>User</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Org</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd166"></div>Resource</div>
      <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Ticket</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff3c5a"></div>Unknown / Ghost</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="flash" id="flash"></div>

<script>
const API = 'http://localhost:8000';
let graphData = { nodes: [], edges: [] };
let simulation = null;

const NODE_COLORS = {
  user:     '#00d4ff',
  org:      '#a78bfa',
  resource: '#ffd166',
  ticket:   '#34d399',
  unknown:  '#ff3c5a',
};

const NODE_RADIUS = { user: 10, org: 13, resource: 12, ticket: 9, unknown: 9 };

// ── Graph Rendering ────────────────────────────────────────────────────────────
function renderGraph(data) {
  const panel = document.getElementById('graph-panel');
  const W = panel.clientWidth, H = panel.clientHeight;
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform)));

  // Defs — arrowhead
  svg.append('defs').append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 18).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#1e2d3d');

  svg.append('defs').append('marker')
    .attr('id', 'arrow-alert')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 18).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#ff3c5a');

  // Grid bg
  const defs = svg.select('defs');
  const pattern = defs.append('pattern')
    .attr('id', 'grid').attr('width', 40).attr('height', 40)
    .attr('patternUnits', 'userSpaceOnUse');
  pattern.append('path')
    .attr('d', 'M 40 0 L 0 0 0 40')
    .attr('fill', 'none').attr('stroke', '#1e2d3d').attr('stroke-width', 0.5);
  svg.insert('rect', ':first-child')
    .attr('width', '100%').attr('height', '100%')
    .attr('fill', 'url(#grid)');

  const nodes = data.nodes.map(d => ({ ...d }));
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  const links = data.edges
    .filter(e => nodeMap.has(e.source) && nodeMap.has(e.target))
    .map(e => ({ ...e, source: e.source, target: e.target }));

  const isAlertNode = new Set(/* will update after alerts */)

  // Force simulation
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(90))
    .force('charge', d3.forceManyBody().strength(-280))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(22));

  simulation = sim;

  // Links
  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', '#1e2d3d')
    .attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrow)');

  // Link labels
  const linkLabel = g.append('g').selectAll('text').data(links).join('text')
    .attr('fill', '#2e4050')
    .attr('font-size', 8)
    .attr('font-family', 'JetBrains Mono')
    .attr('text-anchor', 'middle')
    .text(d => d.rel || '');

  // Node glow
  const glow = g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', d => (NODE_RADIUS[d.type] || 9) + 5)
    .attr('fill', 'none')
    .attr('stroke', d => NODE_COLORS[d.type] || NODE_COLORS.unknown)
    .attr('stroke-width', 0)
    .attr('opacity', 0.3);

  // Nodes
  const node = g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', d => NODE_RADIUS[d.type] || 9)
    .attr('fill', d => NODE_COLORS[d.type] || NODE_COLORS.unknown)
    .attr('stroke', d => d.trust === 'low' ? '#ff3c5a' : '#080c10')
    .attr('stroke-width', d => d.trust === 'low' ? 2 : 1)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('mouseover', (e, d) => showTooltip(e, d))
    .on('mousemove', e => moveTooltip(e))
    .on('mouseout',  () => hideTooltip());

  // Labels
  const label = g.append('g').selectAll('text').data(nodes).join('text')
    .attr('fill', '#8899aa')
    .attr('font-size', 9)
    .attr('font-family', 'JetBrains Mono')
    .attr('text-anchor', 'middle')
    .attr('dy', d => (NODE_RADIUS[d.type] || 9) + 13)
    .text(d => d.label || d.id);

  sim.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
    glow.attr('cx', d => d.x).attr('cy', d => d.y);
    label.attr('x', d => d.x).attr('y', d => d.y);
  });
}

// ── Tooltip ────────────────────────────────────────────────────────────────────
function showTooltip(event, d) {
  const t = document.getElementById('tooltip');
  t.innerHTML = `<strong>${d.label || d.id}</strong>
    type: ${d.type}<br>
    trust: <span style="color:${d.trust === 'low' ? 'var(--red)' : d.trust === 'high' ? 'var(--green)' : 'var(--yellow)'}">${d.trust}</span><br>
    id: ${d.id}`;
  t.classList.add('visible');
  moveTooltip(event);
}
function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top  = (e.clientY - 28) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ── Stats ──────────────────────────────────────────────────────────────────────
async function refreshStats() {
  const r = await fetch(`${API}/stats`);
  const s = await r.json();
  document.getElementById('val-nodes').textContent    = s.total_nodes;
  document.getElementById('val-edges').textContent    = s.total_edges;
  document.getElementById('val-total').textContent    = s.total_alerts;
  document.getElementById('val-critical').textContent = s.critical;
  document.getElementById('val-high').textContent     = s.high;
}

// ── Alerts ─────────────────────────────────────────────────────────────────────
async function refreshAlerts() {
  const r = await fetch(`${API}/alerts`);
  const d = await r.json();
  const feed = document.getElementById('alerts-feed');
  document.getElementById('alert-count').textContent = d.total;

  if (d.alerts.length === 0) {
    feed.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>No alerts yet.<br>Run a simulation<br>to trigger detections.</div>`;
    return;
  }

  feed.innerHTML = d.alerts.map(a => `
    <div class="alert-card ${a.severity}">
      <div class="alert-header">
        <span class="severity-badge ${a.severity}">${a.severity}</span>
        <span class="alert-rule">${a.rule}</span>
        <span class="alert-time">${a.ts_human}</span>
      </div>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-detail">${a.detail}</div>
      </div>
    </div>
  `).join('');
}

// ── Graph Fetch ────────────────────────────────────────────────────────────────
async function refreshGraph() {
  const r = await fetch(`${API}/graph`);
  graphData = await r.json();
  renderGraph(graphData);
}

async function refreshAll() {
  await Promise.all([refreshStats(), refreshAlerts(), refreshGraph()]);
}

// ── Simulate ───────────────────────────────────────────────────────────────────
async function simulate(type) {
  const btn = event.currentTarget;
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';

  await fetch(`${API}/simulate/${type}`, { method: 'POST' });
  await refreshAll();

  // Flash red if new alerts appeared
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 600);

  setTimeout(() => {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }, 800);
}

// ── Reset ──────────────────────────────────────────────────────────────────────
async function resetGraph() {
  await fetch(`${API}/reset`);
  await refreshAll();
}

// ── Init + Poll ────────────────────────────────────────────────────────────────
refreshAll();
setInterval(refreshAll, 4000);
</script>
</body>
</html>
